{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoryVault AI — {% block title %}Authenticate{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="{% static 'vault/css/theme.css' %}">
    <link rel="stylesheet" href="{% static 'vault/css/polish.css' %}">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            position: relative;
            overflow: hidden;
            padding: 24px 16px;
        }
        
        .ambient-orbs {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }
        
        .orb-1 {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
            top: -150px;
            right: -100px;
            animation: orb-drift 12s ease-in-out infinite;
        }
        
        .orb-2 {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(91,33,182,0.08) 0%, transparent 70%);
            bottom: -100px;
            left: -80px;
            animation: orb-drift 16s ease-in-out infinite reverse;
        }

        .grid-mask {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(var(--bs) 1px, transparent 1px), linear-gradient(90deg, var(--bs) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.3;
            mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%);
        }

        .auth-logo-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .logo-mark {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, #722CE4 0%, #5B21B6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-glow-accent);
        }

        .logo-mark i {
            font-size: 22px;
            color: #fff;
        }

        .logo-text-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--tp);
            letter-spacing: -0.02em;
        }

        .logo-text-subtitle {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--tt);
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            background: rgba(18, 19, 42, 0.72);
            backdrop-filter: blur(20px) saturate(140%);
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-xl);
            padding: 32px;
            box-shadow: var(--shadow-lg);
            position: relative;
            z-index: 1;
            animation: scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes orb-drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -20px) scale(1.05); }
            66% { transform: translate(-20px, 15px) scale(0.97); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.96) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Form styling */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 500;
            color: var(--ts);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--tt);
            font-size: 16px;
            transition: color 150ms;
        }

        .input-wrapper input {
            width: 100%;
            height: 44px;
            padding-left: 40px;
            padding-right: 14px;
            background: var(--surface);
            border: 1px solid var(--bd);
            border-radius: var(--radius-md);
            color: var(--tp);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: all 150ms ease-out;
        }

        .input-wrapper input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.25);
        }

        .input-wrapper input:focus + i {
            color: var(--a4);
        }

        .btn-auth {
            width: 100%;
            height: 42px;
            background: linear-gradient(135deg, #722CE4 0%, #5B21B6 100%);
            border: none;
            border-radius: var(--radius-md);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: var(--shadow-xs);
            transition: all 150ms;
        }

        .btn-auth:hover {
            filter: brightness(1.08);
            box-shadow: var(--shadow-glow-accent);
        }

        .btn-auth:active {
            transform: scale(0.98);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--bs);
        }

        .divider-text {
            font-size: 12px;
            color: var(--tt);
        }

        .link-text {
            color: var(--a4);
            cursor: pointer;
            font-weight: 500;
            text-decoration: none;
            transition: color 150ms;
        }

        .link-text:hover {
            color: var(--a5);
        }
    </style>
    {% block extra_styles %}{% endblock %}
</head>
<body>
    <div class="auth-container">
        <div class="ambient-orbs">
            <div class="orb-1"></div>
            <div class="orb-2"></div>
            <div class="grid-mask"></div>
        </div>

        <div style="width: 100%; max-width: 440px; z-index: 10;">
            <div class="auth-logo-section">
                <div class="logo-mark"><i class="ti ti-brain"></i></div>
                <div>
                    <div class="logo-text-title">MemoryVault</div>
                    <div class="logo-text-subtitle">AI Second Brain</div>
                </div>
            </div>

            <div class="auth-card">
                {% block auth_content %}{% endblock %}
            </div>

            <p style="text-align: center; font-size: 12px; color: var(--tt); margin-top: 32px;">
                © 2026 MemoryVault AI · <a href="#" class="link-text">Privacy</a> · <a href="#" class="link-text">Terms</a>
            </p>
        </div>
    </div>
    {% block extra_js %}{% endblock %}
</body>
</html>
