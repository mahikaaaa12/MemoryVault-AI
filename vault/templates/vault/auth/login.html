{% extends 'vault/auth/auth_base.html' %}
{% block title %}Sign In{% endblock %}

{% block auth_content %}
<h2 style="font-size: 20px; font-weight: 700; margin-bottom: 8px; text-align: center;">Welcome back</h2>
<p style="font-size: 14px; color: var(--ts); text-align: center; margin-bottom: 24px;">Please enter your details to sign in</p>

{% if error %}
<div style="background: rgba(239, 68, 68, 0.1); border: 1px solid var(--err); color: #FCA5A5; border-radius: var(--radius-md); padding: 12px; font-size: 13px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px;">
    <i class="ti ti-alert-circle" style="color: var(--err); font-size: 16px;"></i>
    <span>{{ error }}</span>
</div>
{% endif %}

<form method="POST" action="{% url 'login' %}">
    {% csrf_token %}
    <div class="form-group">
        <label for="username">Username or Email</label>
        <div class="input-wrapper">
            <input type="text" name="username" id="username" placeholder="Enter your username or email" required>
            <i class="ti ti-mail"></i>
        </div>
    </div>
    
    <div class="form-group">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <label for="password">Password</label>
            <a href="{% url 'forgot_password' %}" class="link-text" style="font-size: 12px;">Forgot password?</a>
        </div>
        <div class="input-wrapper">
            <input type="password" name="password" id="password" placeholder="Enter your password" required>
            <i class="ti ti-lock"></i>
        </div>
    </div>

    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; font-size: 13px;">
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none;">
            <input type="checkbox" name="remember_me" style="accent-color: var(--a6); width: 16px; height: 16px; border-radius: 4px;">
            <span style="color: var(--ts);">Remember me</span>
        </label>
    </div>

    <button type="submit" class="btn-auth">
        <span>Sign In</span>
        <i class="ti ti-arrow-right"></i>
    </button>
</form>

<div class="divider">
    <div class="divider-line"></div>
    <span class="divider-text">or</span>
    <div class="divider-line"></div>
</div>

<p style="text-align: center; font-size: 14px; color: var(--ts);">
    Don't have an account? <a href="{% url 'signup' %}" class="link-text">Sign up</a>
</p>
{% endblock %}
